<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f12" id="metaTheme">
<title>마켓중심</title>
<style>
  :root{
    --bg:#0d0f12; --scr:#15171c; --s1:#1e2128; --bd:rgba(255,255,255,.09);
    --tp:#e9eaee; --ts:#a1a4ac; --tm:#6c7079; --up:#ff6b66; --dn:#4c8dff;
    --suc:#37c07d; --sucbg:rgba(55,192,125,.16); --warn:#e3b341;
  }
  [data-theme="light"]{
    --bg:#efeee8; --scr:#ffffff; --s1:#f4f3ee; --bd:rgba(0,0,0,.10);
    --tp:#1b1b1a; --ts:#5f5e5a; --tm:#8a8880; --up:#d63a3a; --dn:#2f6fe0;
    --suc:#0f9e5a; --sucbg:rgba(15,158,90,.12); --warn:#b8860b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--tp);
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;}
  .wrap{max-width:480px; margin:0 auto; min-height:100vh; background:var(--scr); padding-bottom:64px;}
  .hd{position:sticky; top:0; background:var(--scr); border-bottom:0.5px solid var(--bd);
    padding:12px 16px 9px; z-index:5;}
  .hrow{display:flex; align-items:center; justify-content:space-between;}
  .title{font-size:17px; font-weight:600; display:flex; align-items:center; gap:7px;}
  .live{font-size:11px; color:var(--suc); background:var(--sucbg); padding:2px 7px; border-radius:20px;
    display:inline-flex; align-items:center; gap:4px;}
  .live.mkt{color:var(--tm); background:transparent; border:0.5px solid var(--bd);}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--suc); display:inline-block;}
  .seg{border:0.5px solid var(--bd); border-radius:8px; display:inline-flex; overflow:hidden;}
  .seg button{font-size:12px; padding:4px 11px; border:0; background:transparent; color:var(--tm);
    cursor:pointer; font-family:inherit;}
  .seg button.on{background:var(--s1); color:var(--tp);}
  .hd-right{display:flex; align-items:center; gap:8px;}
  .rfs{width:30px; height:26px; border:0.5px solid var(--bd); border-radius:8px; background:transparent;
    color:var(--ts); font-size:15px; cursor:pointer; font-family:inherit; line-height:1; padding:0;
    display:inline-flex; align-items:center; justify-content:center;}
  .rfs:active{background:var(--s1);}
  .menu{position:absolute; right:16px; top:46px; background:var(--scr); border:0.5px solid var(--bd);
    border-radius:10px; padding:6px; min-width:132px; z-index:20; display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .menu.open{display:block;}
  .menu .who{font-size:11px; color:var(--tm); padding:5px 10px 8px; border-bottom:0.5px solid var(--bd); margin-bottom:4px;}
  .menu a{display:block; padding:8px 10px; font-size:13px; color:var(--tp); text-decoration:none; border-radius:7px;}
  .menu a:active{background:var(--s1);}
  .menu a.adm{color:var(--warn);}
  .rfs.spin{color:var(--suc); animation:rfspin .8s linear infinite;}
  @keyframes rfspin{to{transform:rotate(360deg);}}
  .sub{font-size:12px; color:var(--tm); margin-top:5px;}
  .sec{padding:10px 16px 2px; font-size:12px; font-weight:600; color:var(--ts);}
  .sec.w{color:var(--warn);} .sec.d{color:var(--up);} .sec.o{color:var(--suc);}
  .sec.h{color:var(--up);} .sec.p{color:var(--dn);}
  .halt{background:var(--up); color:#fff; font-size:10px; font-weight:600;
    padding:1px 5px; border-radius:4px; margin-left:6px;}
  .reason{color:var(--tm); font-size:11px;}
  .list{padding:0 16px;}
  .r{display:flex; align-items:center; justify-content:space-between; padding:5px 0;
    border-bottom:0.5px solid var(--bd); font-size:13.5px;}
  .r:last-child{border-bottom:0;}
  .tag{color:var(--tm); font-size:11px; margin-left:4px;}
  .ps{color:var(--up); font-size:10px; font-weight:600; border:0.5px solid var(--up);
    border-radius:4px; padding:0 4px; margin-left:5px; line-height:1.6; white-space:nowrap;}
  .up{color:var(--up); font-weight:600;} .dn{color:var(--dn); font-weight:600;}
  .amt{color:var(--tm); font-size:11px; margin-right:6px;}
  .card{margin:0 16px 8px; border:0.5px solid var(--bd); border-radius:12px; padding:9px 11px;}
  .ct{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:3px;}
  .cname{font-size:14px; font-weight:600;}
  .cnt{font-size:11px; color:var(--tm);}
  /* 재료 인지도 등급 배지 (★1~5, 높을수록 시장중심주) */
  .gr{font-size:10px; font-weight:700; margin-left:6px; padding:0 5px; border-radius:8px;
      vertical-align:middle; white-space:nowrap;}
  .gr.g1,.gr.g2{color:var(--tm); border:0.5px solid var(--tm);}
  .gr.g3{color:var(--ts); border:0.5px solid var(--ts);}
  .gr.g4{color:var(--up); border:0.5px solid var(--up);}
  .gr.g5{color:#fff; background:var(--up); border:0.5px solid var(--up);}
  .csum{font-size:11.5px; color:var(--ts); line-height:1.45; margin-bottom:7px;}
  .cs{display:flex; justify-content:space-between; padding:2.5px 0; font-size:12.5px;}
  .meta{color:var(--tm); font-size:11px;}
  .code{color:var(--tm); font-size:11px; margin-left:5px;}
  .days{color:var(--tm); font-size:11px; margin-left:8px;}
  .st-on{color:var(--suc); font-size:11px;} .st-off{color:var(--tm); font-size:11px;}
  .wr{display:flex; align-items:center; justify-content:space-between; padding:6px 0;
    border-bottom:0.5px solid var(--bd); font-size:13.5px;}
  .wr:last-child{border-bottom:0;}
  .wr.rel{opacity:.5;} .wr.rel .nm{text-decoration:line-through;}
  .wr .rt{display:flex; align-items:center; gap:4px;}
  .ft{text-align:center; color:var(--tm); font-size:11px; padding:14px 0 22px;}
  .empty{color:var(--tm); font-size:13px; padding:14px 16px;}
  .sec.m{color:var(--up);}
  .mcard{margin:0 16px 8px; border:0.5px solid var(--bd); border-radius:12px; padding:9px 11px;}
  .mcard.hl{border:2px solid var(--up);}
  .mtop{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:2px;}
  .mname{font-size:14px; font-weight:600;}
  .mmeta{font-size:11px; color:var(--tm); line-height:1.5;}
  .mnews{color:var(--suc); font-size:11px; text-decoration:none;}
  .mnews.no{color:var(--tm);}
  .mtgl{display:flex; align-items:center; justify-content:center; gap:5px; padding:9px 0 5px; margin:2px 16px 0; color:var(--ts); font-size:12px; cursor:pointer; border-top:0.5px solid var(--bd);}
  .mtgl:active{color:var(--tp);}
  .mtgl svg{transition:transform .2s;}
  .mtgl.open svg{transform:rotate(180deg);}
  .tabbar{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px;
    display:flex; background:var(--scr); border-top:0.5px solid var(--bd); z-index:10;}
  .tabbar button{flex:1; border:0; background:transparent; color:var(--tm); cursor:pointer;
    font-family:inherit; font-size:11px; padding:7px 0 calc(9px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tabbar button.on{color:var(--tp);}
  .tabbar .ico{font-size:18px; line-height:1;}
  .hide{display:none;}
  /* ── 뉴스 탭 ── */
  .idxwrap{padding:12px 16px 4px; display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .idx{background:var(--scr); border:0.5px solid var(--bd); border-radius:12px; padding:11px 12px;}
  .idx .in{font-size:12.5px; color:var(--ts); font-weight:600;}
  .idx .iv{font-size:20px; font-weight:700; margin-top:3px; letter-spacing:-.3px;}
  .idx .ic{font-size:12px; margin-top:2px; font-weight:600;}
  .idx .inv{display:flex; gap:4px; margin-top:9px; padding-top:8px; border-top:0.5px solid var(--bd);}
  .idx .inv div{flex:1; text-align:center;}
  .idx .inv .l{font-size:10px; color:var(--tm);}
  .idx .inv .vv{font-size:10.5px; font-weight:600; margin-top:1px;}
  .nsec{padding:14px 16px 4px; font-size:12.5px; font-weight:600; color:var(--ts);}
  .ncard{margin:0 16px 8px; border:0.5px solid var(--bd); border-radius:12px; padding:10px 12px;}
  .ncard .nt{display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
  .ncard .nn{font-size:14.5px; font-weight:600;}
  .ncard .nfig{font-size:11.5px; color:var(--tm); margin-top:5px;}
  .ncard .nr{font-size:12px; color:var(--ts); margin-top:5px; line-height:1.55;}
  .ncard .nnews{display:inline-block; margin-top:8px; font-size:11.5px; color:var(--dn); text-decoration:none;}
  .ncard .nnews:active{opacity:.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hrow">
      <div class="title">마켓중심 <span id="badge" class="live"><span class="dot"></span>실시간</span></div>
      <div class="hd-right">
        <button id="refreshBtn" class="rfs" title="새로고침" aria-label="새로고침">↻</button>
        <button id="acctBtn" class="rfs" title="계정" aria-label="계정">≡</button>
        <div class="seg">
          <button data-t="light">라이트</button>
          <button data-t="dark" class="on">다크</button>
        </div>
      </div>
    </div>
    <div class="sub" id="sub">불러오는 중…</div>
    <div class="menu" id="acctMenu">
      <div class="who" id="acctWho">…</div>
      <a href="/admin" class="adm" id="acctAdmin" style="display:none">관리자 페이지</a>
      <a href="/logout">로그아웃</a>
    </div>
  </div>
  <script>
  (function(){
    var btn=document.getElementById('acctBtn'), menu=document.getElementById('acctMenu');
    btn.addEventListener('click',function(e){e.stopPropagation();menu.classList.toggle('open');});
    document.addEventListener('click',function(){menu.classList.remove('open');});
    menu.addEventListener('click',function(e){e.stopPropagation();});
    fetch('/api/me').then(function(r){return r.json();}).then(function(u){
      document.getElementById('acctWho').textContent='@'+u.username;
      if(u.role==='admin') document.getElementById('acctAdmin').style.display='block';
    }).catch(function(){});
  })();
  </script>

  <!-- ── 테마 탭: 상한가 + 테마 ── -->
  <div id="viewTheme">
    <div class="sec m" id="matchSec" style="display:none">조건부합</div>
    <div id="match"></div>
    <div class="sec">상한가</div>
    <div class="list" id="upper"></div>
    <div class="list" id="upperRest" style="display:none"></div>
    <div id="upperToggle" class="mtgl" style="display:none"></div>
    <div class="sec">테마</div>
    <div id="themes"></div>
    <div class="ft" id="foot"></div>
  </div>

  <!-- ── 투경 탭: KRX 시장경보 ── -->
  <div id="viewWarn" class="hide">
    <div class="sec w">투자경고종목</div>
    <div class="list" id="warnList"></div>
    <div class="sec d">투자위험종목</div>
    <div class="list" id="dangerList"></div>
    <div class="sec o">단기과열종목</div>
    <div class="list" id="overList"></div>
    <div class="sec h">거래정지 종목</div>
    <div class="list" id="haltList"></div>
    <div class="sec p">매매거래정지 예고</div>
    <div class="list" id="noticeList"></div>
    <div class="ft" id="warnFoot"></div>
  </div>

  <!-- ── 뉴스 탭: 주요 지수 + 테마 종목 상세 ── -->
  <div id="viewNews" class="hide">
    <div class="sec">주요 지수</div>
    <div class="idxwrap" id="idxWrap"></div>
    <div id="newsStocks"></div>
    <div class="ft" id="newsFoot"></div>
  </div>

  <div class="tabbar">
    <button id="tabTheme" class="on"><svg class="ico" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 9-9"/><path d="M17 7h4v4"/></svg><span>테마</span></button>
    <button id="tabWarn"><svg class="ico" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.2-4.2"/></svg><span>투경</span></button>
    <button id="tabNews"><svg class="ico" viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h13v14H6a2 2 0 0 1-2-2V5z"/><path d="M17 8h2a1 1 0 0 1 1 1v8a2 2 0 0 1-2 2"/><path d="M7 8h7M7 11h7M7 14h4"/></svg><span>뉴스</span></button>
  </div>
</div>

<script>
  var root=document.documentElement, meta=document.getElementById('metaTheme');
  function setTheme(t){
    root.setAttribute('data-theme', t);
    meta.setAttribute('content', t==='light' ? '#efeee8' : '#0d0f12');
    document.querySelectorAll('.seg button').forEach(function(b){b.classList.toggle('on', b.dataset.t===t);});
    try{ localStorage.setItem('theme', t); }catch(e){}
  }
  document.querySelectorAll('.seg button').forEach(function(b){
    b.addEventListener('click', function(){ setTheme(b.dataset.t); });
  });
  var saved='dark';
  try{ saved=localStorage.getItem('theme')||'dark'; }catch(e){}
  setTheme(saved);

  function esc(s){var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML;}
  function pct(r){ return '+'+Number(r).toFixed(2)+'%'; }
  function psTag(n){ n=Number(n)||0; return n>0 ? '<span class="ps">전일 '+n+'상</span>' : ''; }
  function amt(v){ v=Number(v)||0; return v>0 ? '<span class="amt">'+v.toLocaleString()+'억</span>' : ''; }
  function sizeText(cap){
    cap=Number(cap)||0;
    if(cap<=0) return '';
    if(cap>=10000) return '시총'+(cap/10000).toFixed(1)+'조';
    var h=Math.floor(cap/100)*100;
    return h>=100 ? '시총'+h+'억대' : '시총'+cap+'억';
  }

  // ── 테마 탭 렌더 ──
  var lastUpdated='';
  function upperRow(s){
    var tag = s.theme ? '<span class="tag">'+esc(s.theme)+'</span>' : '';
    return '<div class="r"><span>'+esc(s.name)+psTag(s.psang)+tag+'</span><span>'+amt(s.amount)+'<span class="up">'+pct(s.rate)+'</span></span></div>';
  }
  var upperExpanded=false;
  function setUpperToggle(){
    var ur=document.getElementById('upperRest'), ut=document.getElementById('upperToggle');
    var n=ur.children.length;
    ur.style.display = upperExpanded ? '' : 'none';
    ut.className = 'mtgl'+(upperExpanded?' open':'');
    ut.innerHTML = (upperExpanded ? '접기' : '펼치기 ('+n+')')+
      ' <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
  }
  function renderMatch(arr){
    var sec=document.getElementById('matchSec'), box=document.getElementById('match');
    if(!arr || !arr.length){ sec.style.display='none'; box.innerHTML=''; return; }
    sec.style.display='';
    box.innerHTML = arr.map(function(m){
      var tag = m.theme ? '<span class="tag">'+esc(m.theme)+'</span>' : '';
      var meta=[]; if(m.sector) meta.push(esc(m.sector));
      var sz=sizeText(m.cap); if(sz) meta.push(sz);
      var former = (m.amt_name && m.amt_name!==m.name)
        ? '대금 '+esc(m.amt_name)+' '+Number(m.amt_value||0).toLocaleString()+'억'
        : '대금 '+Number(m.amt_value||0).toLocaleString()+'억';
      meta.push(former);
      meta.push(m.peers>0 ? '동조 '+m.peers+'종목' : '단독 급등');
      var news = m.news
        ? '<a class="mnews" href="'+esc(m.news_url)+'" target="_blank" rel="noopener">뉴스 있음 ↗</a>'
        : '<a class="mnews no" href="'+esc(m.news_url)+'" target="_blank" rel="noopener">뉴스 확인 ↗</a>';
      return '<div class="mcard'+(m.highlight?' hl':'')+'"><div class="mtop"><span class="mname">'+
        esc(m.name)+psTag(m.psang)+' '+tag+'</span><span class="up">'+pct(m.rate)+'</span></div>'+
        '<div class="mmeta">'+meta.join(' · ')+' · '+news+'</div></div>';
    }).join('');
  }
  function renderTheme(d){
    lastUpdated = d.updated||'';
    if(tab==='theme') setThemeSub(d);
    renderMatch(d.match||[]);
    var sorted = (d.upper||[]).slice().sort(function(a,b){ return (Number(b.amount)||0)-(Number(a.amount)||0); });
    var u=document.getElementById('upper'), ur=document.getElementById('upperRest'), ut=document.getElementById('upperToggle');
    if(!sorted.length){ u.innerHTML='<div class="empty">현재 상한가 종목이 없습니다.</div>'; ur.innerHTML=''; ut.style.display='none'; }
    else{
      u.innerHTML = sorted.slice(0,3).map(upperRow).join('');
      var rest = sorted.slice(3);
      ur.innerHTML = rest.map(upperRow).join('');
      if(rest.length){ ut.style.display='flex'; setUpperToggle(); }
      else{ ut.style.display='none'; ur.style.display='none'; }
    }
    var th=document.getElementById('themes');
    if(!d.themes.length){ th.innerHTML='<div class="empty">분석된 테마가 없습니다.</div>'; }
    else{
      th.innerHTML = d.themes.map(function(g){
        var rows = g.stocks.map(function(m){
          var parts=[]; if(m.sector) parts.push(esc(m.sector));
          var sz=sizeText(m.cap); if(sz) parts.push(sz);
          if(m.flags&&m.flags.length) parts=parts.concat(m.flags.map(esc));
          var meta = parts.length ? ' <span class="meta">'+parts.join('·')+'</span>' : '';
          return '<div class="cs"><span>'+esc(m.name)+psTag(m.psang)+meta+'</span><span>'+amt(m.amount)+'<span class="up">'+pct(m.rate)+'</span></span></div>';
        }).join('');
        var sum = g.summary ? '<div class="csum">'+esc(g.summary).replace(/\n/g,' ')+'</div>' : '';
        var total = Number(g.amount)>0 ? '<span class="amt">'+Number(g.amount).toLocaleString()+'억</span> · ' : '';
        var gd = Number(g.grade)||0;
        var gr = gd>=3 ? '<span class="gr g'+gd+'">★'+gd+'</span>' : '';  // 3성급 이상만 배지
        return '<div class="card"><div class="ct"><span class="cname">'+esc(g.theme)+gr+
          '</span><span class="cnt">'+total+g.stocks.length+'종목</span></div>'+sum+rows+'</div>';
      }).join('');
    }
    document.getElementById('foot').textContent = '마지막 업데이트 '+(d.updated||'-')+' · 1분마다 시세 갱신 · 10분마다 테마 재분석';
  }
  function setThemeSub(d){
    document.getElementById('sub').innerHTML =
      '상한가 <b style="color:var(--up)">'+d.upper.length+'</b> · 테마 <b>'+d.themes.length+'</b> · '+esc(d.updated||'-');
  }

  // ── 거래일수(X일차) 계산: 조회 시점(오늘) 기준 ──
  // 지정일=1일차. 파일 생성 시점과 무관하게 브라우저의 오늘 날짜로 계산해
  // 저녁 cron/당일 재실행에 따라 값이 밀리는 문제를 제거한다.
  var KRX_HOL={'2026-01-01':1,'2026-01-29':1,'2026-01-30':1,'2026-01-31':1,'2026-02-01':1,
    '2026-02-02':1,'2026-03-01':1,'2026-05-01':1,'2026-05-15':1,'2026-08-15':1,'2026-09-24':1,
    '2026-09-25':1,'2026-09-26':1,'2026-09-27':1,'2026-10-03':1,'2026-10-09':1,'2026-12-25':1};
  function _iso(dt){var m=dt.getMonth()+1,d=dt.getDate();return dt.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(d<10?'0'+d:d);}
  function _isBday(dt){var w=dt.getDay();return w!==0&&w!==6&&!KRX_HOL[_iso(dt)];}
  function _parseD(s){if(!s||s==='-')return null;var p=s.replace(/\//g,'-').split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function _prevBday(dt){var d=new Date(dt);while(!_isBday(d))d.setDate(d.getDate()-1);return d;}
  function _busDays(a,b){var n=0,c=new Date(a);while(c<b){if(_isBday(c))n++;c.setDate(c.getDate()+1);}return n;}
  function dayCount(des,free,haltDates){
    var d=_parseD(des); if(!d) return 0;
    var end=_parseD(free);            // 해제 종목: 해제일에 고정. 지정 중: 오늘(직전 영업일).
    end=end?end:_prevBday(new Date());
    var n=_busDays(d,end)+1;
    if(haltDates && haltDates.length){  // 매매거래정지일(오늘 이하)은 거래일수에서 제외
      var s=_iso(d), e=_iso(end);
      n-=haltDates.filter(function(x){return x>=s && x<=e;}).length;
    }
    return n<1?1:n;
  }

  // ── 투경 탭 렌더 ──
  function warnRows(arr){
    if(!arr.length) return '<div class="empty">해당 종목이 없습니다.</div>';
    return arr.map(function(w){
      var st = w.released ? '<span class="st-off">'+esc(w.state)+'</span>'
                          : '<span class="st-on">지정 중</span>';
      var dc = dayCount(w.des, w.free, w.halt_dates);
      var days = (dc>0) ? '<span class="days">'+dc+'일차</span>' : '';
      var hb = w.halted ? '<span class="halt">정지</span>' : '';
      return '<div class="wr'+(w.released?' rel':'')+'"><span class="nm">'+esc(w.name)+hb+
        '<span class="code">'+esc(w.code)+'</span></span><span class="rt">'+days+st+'</span></div>';
    }).join('');
  }
  function overRows(arr){
    if(!arr.length) return '<div class="empty">해당 종목이 없습니다.</div>';
    return arr.map(function(o){
      var sign = o.up ? '<span class="up">▲'+esc(o.chg)+'</span>'
               : o.down ? '<span class="dn">▼'+esc(o.chg)+'</span>'
               : '<span class="amt">'+esc(o.chg)+'</span>';
      var dc = dayCount(o.des, o.free, o.halt_dates);
      var days = (dc>0) ? '<span class="days">'+dc+'일차</span>' : '';
      var hb = o.halted ? '<span class="halt">정지</span>' : '';
      return '<div class="wr"><span class="nm">'+esc(o.name)+hb+'<span class="code">'+esc(o.code)+
        '</span></span><span class="rt"><span style="font-size:12px">'+esc(o.price)+'</span>'+
        '<span style="margin-left:6px">'+sign+'</span>'+days+'</span></div>';
    }).join('');
  }
  function haltRows(arr){
    if(!arr.length) return '<div class="empty">현재 거래정지 종목이 없습니다.</div>';
    return arr.map(function(h){
      var code = h.code ? '<span class="code">'+esc(h.code)+'</span>' : '';
      return '<div class="wr"><span class="nm">'+esc(h.name)+code+
        '</span><span class="rt"><span class="reason">'+esc(h.reason||'')+'</span></span></div>';
    }).join('');
  }
  function noticeRows(arr){
    if(!arr.length) return '<div class="empty">오늘 매매거래정지 예고 공시가 없습니다.</div>';
    return arr.map(function(n){
      var code = n.code ? '<span class="code">'+esc(n.code)+'</span>' : '';
      var tm = n.time ? '<span class="days">'+esc(n.time)+'</span>' : '';
      return '<div class="wr"><span class="nm">'+esc(n.name)+code+
        '</span><span class="rt"><span class="reason">'+esc(n.title||'')+'</span>'+tm+'</span></div>';
    }).join('');
  }
  function renderWarn(a){
    document.getElementById('warnList').innerHTML = warnRows(a.warning||[]);
    document.getElementById('dangerList').innerHTML = warnRows(a.danger||[]);
    document.getElementById('overList').innerHTML = overRows(a.overheat||[]);
    document.getElementById('haltList').innerHTML = haltRows(a.halted||[]);
    document.getElementById('noticeList').innerHTML = noticeRows(a.halt_notice||[]);
    var c=a.counts||{warning:0,danger:0,overheat:0};
    if(tab==='warn'){
      document.getElementById('sub').innerHTML =
        '기준 '+esc(a.trade_date||'-')+' · 투경 <b style="color:var(--warn)">'+c.warning+
        '</b> · 투위 <b style="color:var(--up)">'+c.danger+'</b> · 과열 <b>'+c.overheat+'</b>';
    }
    document.getElementById('warnFoot').textContent =
      (a.updated ? '수집 '+a.updated : '아직 수집 전') + ' · 매일 장 마감 후 갱신';
  }

  // ── 뉴스 탭 렌더 (같은 /api/data 재사용: 지수 + 테마 종목 상세) ──
  function idxCard(x){
    var s = Number(x.dir)||0;
    if(!s && x.change!=null){ s = x.change>0?1:(x.change<0?-1:0); }
    var cls = s>0?'up':(s<0?'dn':''), arrow = s>0?'▲':(s<0?'▼':'·');
    var pre = s>0?'+':(s<0?'-':'');
    var val = x.value!=null ? Number(x.value).toLocaleString(undefined,{maximumFractionDigits:2}) : '-';
    var chTxt = x.change!=null ? pre+Math.abs(Number(x.change)).toLocaleString(undefined,{maximumFractionDigits:2}) : '';
    var rtTxt = x.rate!=null ? ' ('+pre+Math.abs(Number(x.rate)).toFixed(2)+'%)' : '';
    var inv='';
    if(x.investors){
      var io=x.investors;
      function iv(label,v){
        if(v==null) return '<div><div class="l">'+label+'</div><div class="vv">-</div></div>';
        var c=v>0?'up':(v<0?'dn':'');
        return '<div><div class="l">'+label+'</div><div class="vv '+c+'">'+(v>0?'+':'')+Number(v).toLocaleString()+'</div></div>';
      }
      inv='<div class="inv">'+iv('외국인',io.foreign)+iv('개인',io.individual)+iv('기관',io.institution)+'</div>';
    }
    return '<div class="idx"><div class="in">'+esc(x.name)+'</div><div class="iv">'+val+'</div>'+
      '<div class="ic '+cls+'">'+arrow+' '+chTxt+rtTxt+'</div>'+inv+'</div>';
  }
  function newsStockCard(m){
    var figs=[]; var sz=sizeText(m.cap); if(sz) figs.push(sz);
    if(Number(m.amount)>0) figs.push('거래대금 '+Number(m.amount).toLocaleString()+'억');
    var fig = figs.length ? '<div class="nfig">'+figs.join(' · ')+'</div>' : '';
    var reasons=[]; if(m.sector) reasons.push(esc(m.sector));
    if(m.flags&&m.flags.length) reasons=reasons.concat(m.flags.map(esc));
    var rz = reasons.length ? '<div class="nr">'+reasons.join(' · ')+'</div>' : '';
    var news = m.code
      ? '<a class="nnews" href="https://m.stock.naver.com/domestic/stock/'+encodeURIComponent(m.code)+'/news" target="_blank" rel="noopener">종목 뉴스 ↗</a>'
      : '';
    return '<div class="ncard"><div class="nt"><span class="nn">'+esc(m.name)+psTag(m.psang)+
      '</span><span class="up">'+pct(m.rate)+'</span></div>'+fig+rz+news+'</div>';
  }
  function renderNews(d){
    var idx=d.indices||[];
    document.getElementById('idxWrap').innerHTML = idx.length
      ? idx.map(idxCard).join('')
      : '<div class="empty" style="grid-column:1/-1">지수 데이터가 아직 없습니다.</div>';
    var themes=d.themes||[], ns=document.getElementById('newsStocks');
    ns.innerHTML = themes.length
      ? themes.map(function(g){ return '<div class="nsec">'+esc(g.theme)+'</div>'+g.stocks.map(newsStockCard).join(''); }).join('')
      : '<div class="nsec">테마 종목</div><div class="empty">표시할 종목이 없습니다.</div>';
    if(tab==='news')
      document.getElementById('sub').innerHTML='지수 <b>'+idx.length+'</b> · 테마 종목 상세 · '+esc(d.updated||'-');
    document.getElementById('newsFoot').textContent='마지막 업데이트 '+(d.updated||'-')+' · 지수 2분 · 종목 1분 갱신';
  }

  // ── 데이터 로드 ──
  var lastData=null, lastAlert=null;
  function loadTheme(cb){
    fetch('/api/data',{cache:'no-store'}).then(function(r){return r.json();})
      .then(function(d){ lastData=d; renderTheme(d); if(tab==='news') renderNews(d); if(cb)cb(d); })
      .catch(function(){ if(tab==='theme') document.getElementById('sub').textContent='데이터를 불러오지 못했습니다.'; });
  }
  function loadWarn(cb){
    fetch('/api/alert',{cache:'no-store'}).then(function(r){return r.json();})
      .then(function(a){ lastAlert=a; renderWarn(a); if(cb)cb(a); })
      .catch(function(){ if(tab==='warn') document.getElementById('sub').textContent='시장경보 데이터를 불러오지 못했습니다.'; });
  }

  // ── 탭 전환 ──
  var tab='theme';
  var badge=document.getElementById('badge');
  function selectTab(t){
    tab=t;
    document.getElementById('viewTheme').classList.toggle('hide', t!=='theme');
    document.getElementById('viewWarn').classList.toggle('hide', t!=='warn');
    document.getElementById('viewNews').classList.toggle('hide', t!=='news');
    document.getElementById('tabTheme').classList.toggle('on', t==='theme');
    document.getElementById('tabWarn').classList.toggle('on', t==='warn');
    document.getElementById('tabNews').classList.toggle('on', t==='news');
    if(t==='warn'){
      badge.className='live mkt'; badge.textContent='시장경보';
      if(lastAlert) renderWarn(lastAlert); else { document.getElementById('sub').textContent='불러오는 중…'; loadWarn(); }
    }else if(t==='news'){
      badge.className='live'; badge.innerHTML='<span class="dot"></span>실시간';
      if(lastData) renderNews(lastData); else { document.getElementById('sub').textContent='불러오는 중…'; loadTheme(); }
    }else{
      badge.className='live'; badge.innerHTML='<span class="dot"></span>실시간';
      if(lastData) setThemeSub(lastData); else loadTheme();
    }
  }
  document.getElementById('tabTheme').addEventListener('click', function(){ selectTab('theme'); });
  document.getElementById('tabWarn').addEventListener('click', function(){ selectTab('warn'); });
  document.getElementById('tabNews').addEventListener('click', function(){ selectTab('news'); });
  document.getElementById('upperToggle').addEventListener('click', function(){ upperExpanded=!upperExpanded; setUpperToggle(); });

  // 초기 로드
  loadTheme();
  loadWarn();
  setInterval(function(){ loadTheme(); }, 60000);   // 테마는 1분 자동 갱신

  // ── 새로고침 버튼 (현재 탭 기준) ──
  var rbtn=document.getElementById('refreshBtn'), refreshing=false;
  function endRefresh(){ refreshing=false; rbtn.classList.remove('spin'); }
  function pollRefresh(before, n){
    if(n>24){ endRefresh(); return; }
    fetch('/api/data',{cache:'no-store'}).then(function(r){return r.json();})
      .then(function(d){
        if(d.updated && d.updated!==before){ lastData=d; renderTheme(d); if(tab==='news') renderNews(d); endRefresh(); }
        else setTimeout(function(){ pollRefresh(before, n+1); }, 3000);
      })
      .catch(function(){ setTimeout(function(){ pollRefresh(before, n+1); }, 3000); });
  }
  rbtn.addEventListener('click', function(){
    if(tab==='warn'){ rbtn.classList.add('spin'); loadWarn(function(){ rbtn.classList.remove('spin'); }); return; }
    if(refreshing) return;
    refreshing=true; rbtn.classList.add('spin');
    var before=lastUpdated;
    fetch('/api/refresh',{method:'POST'}).then(function(r){return r.json();})
      .then(function(res){ if(res && res.status==='busy'){ endRefresh(); return; } pollRefresh(before, 0); })
      .catch(function(){ endRefresh(); });
  });
</script>
</body>
</html>
